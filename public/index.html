<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>StreetVoice 資料擷取工具</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: light dark;
            /* Light theme (default) */
            --bg-deep: #F4F5F7;
            --bg-base: #EDEEF0;
            --bg-elevated: #FFFFFF;
            --surface: rgba(0, 0, 0, 0.03);
            --surface-hover: rgba(0, 0, 0, 0.05);
            --surface-active: rgba(0, 0, 0, 0.07);
            --glass: rgba(255, 255, 255, 0.70);
            --glass-border: rgba(0, 0, 0, 0.06);
            --glass-border-hover: rgba(0, 0, 0, 0.12);
            --foreground: #1A1C20;
            --foreground-muted: #6B7080;
            --foreground-dim: #9CA3AF;
            --accent: #f9595f;
            --accent-light: #fb7b80;
            --accent-glow: rgba(249, 89, 95, 0.18);
            --accent-subtle: rgba(249, 89, 95, 0.08);
            --success: #10B981;
            --success-glow: rgba(16, 185, 129, 0.15);
            --error: #EF4444;
            --error-bg: rgba(239, 68, 68, 0.08);
            --info: #3B82F6;
            --info-bg: rgba(59, 130, 246, 0.08);
            --blob-opacity: 0.07;
            --log-bg: #FAFAFA;
            --log-border: rgba(0, 0, 0, 0.06);
            --log-text: #6B7080;
            --log-time: #9CA3AF;
            --spinner-track: rgba(255, 255, 255, 0.3);
            --spinner-head: #fff;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --easing: cubic-bezier(0.16, 1, 0.3, 1);
            --duration: 250ms;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-deep: #050506;
                --bg-base: #0a0a0f;
                --bg-elevated: #111118;
                --surface: rgba(255, 255, 255, 0.04);
                --surface-hover: rgba(255, 255, 255, 0.07);
                --surface-active: rgba(255, 255, 255, 0.10);
                --glass: rgba(255, 255, 255, 0.06);
                --glass-border: rgba(255, 255, 255, 0.08);
                --glass-border-hover: rgba(255, 255, 255, 0.14);
                --foreground: #EDEDEF;
                --foreground-muted: #8A8F98;
                --foreground-dim: #555860;
                --accent: #f9595f;
                --accent-light: #fb7b80;
                --accent-glow: rgba(249, 89, 95, 0.25);
                --accent-subtle: rgba(249, 89, 95, 0.12);
                --success: #34D399;
                --success-glow: rgba(52, 211, 153, 0.2);
                --error: #F87171;
                --error-bg: rgba(248, 113, 113, 0.1);
                --info: #60A5FA;
                --info-bg: rgba(96, 165, 250, 0.1);
                --blob-opacity: 0.10;
                --log-bg: var(--bg-deep);
                --log-border: var(--glass-border);
                --log-text: var(--foreground-muted);
                --log-time: var(--foreground-dim);
                --spinner-track: rgba(255, 255, 255, 0.3);
                --spinner-head: #fff;
            }
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            color: var(--foreground);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Ambient background blobs */
        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .ambient .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: var(--blob-opacity);
            animation: float 20s ease-in-out infinite;
        }

        .ambient .blob-1 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -120px;
            right: -80px;
            animation-delay: 0s;
        }

        .ambient .blob-2 {
            width: 400px;
            height: 400px;
            background: #3B82F6;
            bottom: -100px;
            left: -100px;
            animation-delay: -7s;
        }

        .ambient .blob-3 {
            width: 300px;
            height: 300px;
            background: #EC4899;
            top: 50%;
            left: 50%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        @media (prefers-reduced-motion: reduce) {
            .ambient .blob { animation: none; }
            .container, .checkbox-item, .upload-btn, .process-btn, .download-btn {
                transition: none !important;
                animation: none !important;
            }
        }

        /* Layout */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px 60px;
        }

        .container {
            width: 100%;
            max-width: 640px;
            animation: fadeInUp 0.6s var(--easing) both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 0 0 36px;
        }

        .header-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: var(--accent-subtle);
            margin-bottom: 20px;
            position: relative;
        }

        .header-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), transparent 60%);
            z-index: -1;
            opacity: 0.5;
        }

        .header-icon svg {
            width: 30px;
            height: 30px;
            color: var(--accent-light);
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--foreground);
            margin-bottom: 6px;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--foreground-muted);
            font-weight: 400;
        }

        /* Glass card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            .card {
                box-shadow: none;
            }
        }

        /* Upload area */
        .upload-section {
            border: 1.5px dashed var(--foreground-dim);
            border-radius: var(--radius-sm);
            padding: 40px 24px;
            text-align: center;
            transition: all var(--duration) var(--easing);
            cursor: pointer;
        }

        .upload-section:hover,
        .upload-section.dragover {
            border-color: var(--accent);
            background: var(--accent-subtle);
        }

        .upload-section.dragover {
            transform: scale(1.01);
        }

        .upload-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--surface);
            margin-bottom: 16px;
        }

        .upload-icon svg {
            width: 22px;
            height: 22px;
            color: var(--foreground-muted);
        }

        .upload-section h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 6px;
        }

        .upload-section .hint {
            font-size: 0.8rem;
            color: var(--foreground-dim);
            margin-bottom: 16px;
        }

        .file-input { display: none; }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff;
            padding: 10px 22px;
            border: none;
            border-radius: var(--radius-xs);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            transition: all var(--duration) var(--easing);
        }

        .upload-btn:hover {
            background: var(--accent-light);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .upload-btn:active { transform: scale(0.97); }

        .upload-section .drag-hint {
            margin-top: 12px;
            font-size: 0.75rem;
            color: var(--foreground-dim);
        }

        /* File info */
        .file-info {
            display: none;
            background: var(--info-bg);
            border: 1px solid rgba(96, 165, 250, 0.15);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            margin-top: 16px;
        }

        .file-info .file-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-info svg {
            width: 18px;
            height: 18px;
            color: var(--info);
            flex-shrink: 0;
        }

        .file-info .file-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--foreground);
        }

        .file-info .file-size {
            font-size: 0.75rem;
            color: var(--foreground-muted);
            margin-left: auto;
        }

        /* Section title */
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 14px;
        }

        .section-title svg {
            width: 18px;
            height: 18px;
            color: var(--foreground-muted);
        }

        /* Checkbox items */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--duration) var(--easing);
        }

        .checkbox-item:hover {
            background: var(--surface-hover);
            border-color: var(--glass-border-hover);
        }

        .checkbox-item:has(input:checked) {
            background: var(--accent-subtle);
            border-color: rgba(249, 89, 95, 0.2);
        }

        /* Custom checkbox */
        .custom-check {
            position: relative;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .custom-check input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 1;
            margin: 0;
        }

        .custom-check .check-box {
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--foreground-dim);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--duration) var(--easing);
            background: transparent;
        }

        .custom-check input:checked + .check-box {
            background: var(--accent);
            border-color: var(--accent);
        }

        .custom-check .check-box svg {
            width: 13px;
            height: 13px;
            color: #fff;
            opacity: 0;
            transform: scale(0.5);
            transition: all var(--duration) var(--easing);
        }

        .custom-check input:checked + .check-box svg {
            opacity: 1;
            transform: scale(1);
        }

        .custom-check input:focus-visible + .check-box {
            outline: 2px solid var(--accent-light);
            outline-offset: 2px;
        }

        .checkbox-text .label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--foreground);
        }

        .checkbox-text .desc {
            font-size: 0.75rem;
            color: var(--foreground-muted);
            margin-top: 2px;
        }

        /* Process button */
        .process-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent), #e04349);
            color: #fff;
            padding: 15px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--duration) var(--easing);
            position: relative;
            overflow: hidden;
        }

        .process-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
            opacity: 0;
            transition: opacity var(--duration) var(--easing);
        }

        .process-btn:hover:not(:disabled)::before { opacity: 1; }

        .process-btn:hover:not(:disabled) {
            box-shadow: 0 4px 24px var(--accent-glow);
            transform: translateY(-1px);
        }

        .process-btn:active:not(:disabled) { transform: scale(0.98); }

        .process-btn:disabled {
            background: var(--surface);
            color: var(--foreground-dim);
            cursor: not-allowed;
            box-shadow: none;
        }

        .process-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--spinner-track);
            border-top-color: var(--spinner-head);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .process-btn.loading .spinner { display: block; }
        .process-btn.loading .btn-icon { display: none; }

        /* Progress section */
        .progress-section {
            display: none;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .progress-status {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--foreground);
        }

        .progress-count {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--foreground-muted);
            font-variant-numeric: tabular-nums;
        }

        .progress-track {
            background: var(--surface);
            border-radius: 6px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 6px;
            transition: width 0.5s var(--easing);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .progress-pct {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--foreground);
            margin-bottom: 14px;
            font-variant-numeric: tabular-nums;
        }

        .status-log {
            max-height: 150px;
            overflow-y: auto;
            background: var(--log-bg);
            border: 1px solid var(--log-border);
            padding: 14px;
            border-radius: var(--radius-xs);
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.75rem;
            line-height: 1.6;
            color: var(--log-text);
        }

        .status-log .log-entry {
            padding: 2px 0;
        }

        .status-log .log-time {
            color: var(--log-time);
            margin-right: 6px;
        }

        .status-log::-webkit-scrollbar { width: 4px; }
        .status-log::-webkit-scrollbar-track { background: transparent; }
        .status-log::-webkit-scrollbar-thumb { background: var(--foreground-dim); border-radius: 2px; }

        /* Download section */
        .download-section {
            display: none;
            text-align: center;
            padding: 6px 0 0;
        }

        .download-success {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--success-glow);
            margin-bottom: 14px;
        }

        .download-success svg {
            width: 26px;
            height: 26px;
            color: var(--success);
        }

        .download-section h4 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 4px;
        }

        .download-section .sub {
            font-size: 0.8rem;
            color: var(--foreground-muted);
            margin-bottom: 18px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--success);
            color: #fff;
            padding: 12px 28px;
            border: none;
            border-radius: var(--radius-xs);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all var(--duration) var(--easing);
        }

        .download-btn:hover {
            box-shadow: 0 4px 20px var(--success-glow);
            transform: translateY(-1px);
        }

        .download-btn:active { transform: scale(0.97); }

        .download-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Alerts */
        .alert {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            animation: fadeInUp 0.3s var(--easing) both;
        }

        .alert svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .alert-error {
            background: var(--error-bg);
            border: 1px solid rgba(248, 113, 113, 0.15);
            color: var(--error);
        }

        .alert-success {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.15);
            color: var(--success);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: var(--foreground-dim);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .page { padding: 24px 14px 40px; }
            .card { padding: 20px; }
            .header h1 { font-size: 1.4rem; }
            .upload-section { padding: 30px 16px; }
            .progress-header { flex-direction: column; align-items: flex-start; gap: 4px; }
        }
    </style>
</head>
<body>
    <!-- Ambient background -->
    <div class="ambient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="page">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div class="header-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                </div>
                <h1>StreetVoice 資料擷取工具</h1>
                <p>上傳 Excel 檔案，自動擷取歌詞和音樂人資訊</p>
            </div>

            <!-- Upload Card -->
            <div class="card">
                <div class="upload-section" id="uploadSection" role="button" tabindex="0" aria-label="點擊或拖拽上傳 Excel 檔案">
                    <div class="upload-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <h3>選擇 Excel 檔案</h3>
                    <p class="hint">支援 .xlsx 格式，需包含「作品名稱」和「作者」欄位</p>
                    <input type="file" id="fileInput" class="file-input" accept=".xlsx" />
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                        選擇檔案
                    </button>
                    <p class="drag-hint">或將檔案拖拽到此處</p>
                </div>

                <div class="file-info" id="fileInfo">
                    <div class="file-row">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        <span class="file-name" id="fileName"></span>
                        <span class="file-size" id="fileSize"></span>
                    </div>
                </div>
            </div>

            <!-- Options Card -->
            <div class="card">
                <div class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    擷取選項
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <div class="custom-check">
                            <input type="checkbox" id="lyricsOption" value="lyrics" checked>
                            <div class="check-box">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </div>
                        </div>
                        <div class="checkbox-text">
                            <div class="label">歌詞</div>
                            <div class="desc">從作品頁面擷取完整歌詞內容</div>
                        </div>
                    </label>

                    <label class="checkbox-item">
                        <div class="custom-check">
                            <input type="checkbox" id="categoryOption" value="category" checked>
                            <div class="check-box">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </div>
                        </div>
                        <div class="checkbox-text">
                            <div class="label">音樂人類別</div>
                            <div class="desc">擷取音樂人的類別標籤（樂團、歌手等）</div>
                        </div>
                    </label>

                    <label class="checkbox-item">
                        <div class="custom-check">
                            <input type="checkbox" id="bioOption" value="bio" checked>
                            <div class="check-box">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </div>
                        </div>
                        <div class="checkbox-text">
                            <div class="label">音樂人介紹</div>
                            <div class="desc">擷取音樂人的完整介紹和社群連結</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Action -->
            <button class="process-btn" id="processBtn" disabled onclick="startProcessing()">
                <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <div class="spinner"></div>
                <span id="processBtnText">開始處理</span>
            </button>

            <!-- Progress Card -->
            <div class="card progress-section" id="progressSection">
                <div class="progress-pct" id="progressPercentage">0%</div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-header">
                    <div class="progress-status" id="progressStatus">準備中...</div>
                    <div class="progress-count" id="progressCount">0 / 0</div>
                </div>
                <div class="status-log" id="statusLog" role="log" aria-live="polite"></div>
            </div>

            <!-- Download Card -->
            <div class="card download-section" id="downloadSection">
                <div class="download-success">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <h4>處理完成</h4>
                <p class="sub">您的檔案已成功處理，點擊下方按鈕下載結果</p>
                <a href="#" class="download-btn" id="downloadBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    下載 Excel 檔案
                </a>
            </div>

            <!-- Alerts -->
            <div id="alertContainer"></div>

            <div class="footer">StreetVoice Scraper &middot; 自動擷取音樂資料</div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let processing = false;
        let socket = null;

        function initSocket() {
            socket = io();
            socket.on('connect', () => console.log('Connected'));
            socket.on('disconnect', () => console.log('Disconnected'));
            socket.on('progress', (data) => updateProgress(data));
        }

        const fileInput = document.getElementById('fileInput');
        const uploadSection = document.getElementById('uploadSection');
        const fileInfo = document.getElementById('fileInfo');
        const processBtn = document.getElementById('processBtn');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });

        uploadSection.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });

        uploadSection.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                document.getElementById('fileInput').click();
            }
        });

        function handleFile(file) {
            if (!file.name.endsWith('.xlsx')) {
                showAlert('請選擇 .xlsx 格式的 Excel 檔案', 'error');
                return;
            }
            selectedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            fileInfo.style.display = 'block';
            processBtn.disabled = false;
        }

        async function startProcessing() {
            if (!selectedFile || processing) return;

            const selectedOptions = getSelectedOptions();
            if (selectedOptions.length === 0) {
                showAlert('請至少選擇一個擷取選項', 'error');
                return;
            }

            processing = true;
            processBtn.disabled = true;
            processBtn.classList.add('loading');
            document.getElementById('processBtnText').textContent = '處理中...';

            const progressSection = document.getElementById('progressSection');
            const downloadSection = document.getElementById('downloadSection');
            progressSection.style.display = 'block';
            downloadSection.style.display = 'none';
            document.getElementById('statusLog').innerHTML = '';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('options', JSON.stringify(selectedOptions));

            try {
                const response = await fetch('/process', { method: 'POST', body: formData });

                if (response.ok) {
                    const result = await response.blob();
                    const downloadUrl = URL.createObjectURL(result);
                    document.getElementById('downloadBtn').href = downloadUrl;
                    document.getElementById('downloadBtn').download = `processed_${selectedFile.name}`;
                    downloadSection.style.display = 'block';
                    progressSection.style.display = 'none';
                    showAlert('檔案處理完成！', 'success');
                } else {
                    const error = await response.text();
                    throw new Error(error);
                }
            } catch (error) {
                showAlert(`處理失敗: ${error.message}`, 'error');
                progressSection.style.display = 'none';
            } finally {
                processing = false;
                processBtn.disabled = false;
                processBtn.classList.remove('loading');
                document.getElementById('processBtnText').textContent = '開始處理';
            }
        }

        function updateProgress(data) {
            const { progress, current, total, status, log } = data;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressPercentage').textContent = `${progress}%`;
            document.getElementById('progressStatus').textContent = status;
            document.getElementById('progressCount').textContent = `${current} / ${total}`;

            if (log) {
                const statusLog = document.getElementById('statusLog');
                const time = new Date().toLocaleTimeString();
                statusLog.innerHTML += `<div class="log-entry"><span class="log-time">${time}</span>${log}</div>`;
                statusLog.scrollTop = statusLog.scrollHeight;
            }
        }

        function getSelectedOptions() {
            const options = [];
            if (document.getElementById('lyricsOption').checked) options.push('lyrics');
            if (document.getElementById('categoryOption').checked) options.push('category');
            if (document.getElementById('bioOption').checked) options.push('bio');
            return options;
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const icon = type === 'error'
                ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';

            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `${icon}<span>${message}</span>`;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        document.addEventListener('DOMContentLoaded', () => initSocket());
    </script>
</body>
</html>
